<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FisioTrack Google Sheets</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px;color:#102033}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#fff;border:1px solid #d9e3f0;border-radius:18px;padding:20px;margin-bottom:16px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:12px;border:1px solid #d9e3f0;border-radius:12px;box-sizing:border-box}
    textarea{min-height:100px;resize:vertical}
    button{padding:12px 16px;border:none;border-radius:12px;background:#1d4ed8;color:#fff;font-weight:700;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1 / -1}
    .list{display:grid;gap:12px}
    .item{border:1px solid #d9e3f0;border-radius:14px;padding:14px;background:#f8fbff}
    @media(max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>FisioTrack + Google Sheets</h1>
      <p>Cadastro simples de atletas e ocorrências salvando direto na planilha.</p>
    </div>

    <div class="card">
      <h2>Carregar dados</h2>
      <button onclick="loadAllData()">Atualizar do Google Sheets</button>
    </div>

    <div class="card">
      <h2>Novo atleta</h2>
      <div class="grid">
        <div><input id="nome" placeholder="Nome do atleta"></div>
        <div><input id="modalidade" placeholder="Modalidade"></div>
        <div><input id="idade" type="number" placeholder="Idade"></div>
        <div><input id="categoria" placeholder="Categoria"></div>
        <div><select id="sexo"><option value="">Sexo</option><option>Masculino</option><option>Feminino</option></select></div>
        <div><input id="dominancia" placeholder="Dominância"></div>
        <div class="full"><textarea id="observacoes" placeholder="Observações"></textarea></div>
        <div class="full"><button onclick="addAthlete()">Salvar atleta</button></div>
      </div>
    </div>

    <div class="card">
      <h2>Nova ocorrência</h2>
      <div class="grid">
        <div>
          <select id="atleta_id"></select>
        </div>
        <div><input id="data" type="date"></div>
        <div><input id="local" placeholder="Local"></div>
        <div><select id="tipo"><option>Lesão</option><option>Queixa</option></select></div>
        <div><select id="severidade"><option>Leve</option><option>Moderada</option><option>Alta</option></select></div>
        <div><select id="status"><option>Em acompanhamento</option><option>Resolvido</option><option>Recorrente</option></select></div>
        <div><input id="retorno_treino" placeholder="Retorno ao treino"></div>
        <div><input id="mecanismo" placeholder="Mecanismo"></div>
        <div><input id="profissional" placeholder="Profissional responsável"></div>
        <div class="full"><textarea id="descricao" placeholder="Descrição"></textarea></div>
        <div class="full"><textarea id="conduta" placeholder="Conduta fisioterapêutica"></textarea></div>
        <div class="full"><button onclick="addOccurrence()">Salvar ocorrência</button></div>
      </div>
    </div>

    <div class="card">
      <h2>Atletas</h2>
      <div id="athletesList" class="list"></div>
    </div>

    <div class="card">
      <h2>Ocorrências</h2>
      <div id="occurrencesList" class="list"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz0EfZ31sy4R5jcRhe8VfKwdHPADg87wPxFstmc4sPH9qE6W21Z4TDts-GISMWoipzH/exec';

    let atletas = [];
    let ocorrencias = [];

    document.getElementById('data').value = new Date().toISOString().slice(0,10);

    async function apiGet(action) {
      const res = await fetch(`${API_URL}?action=${action}`);
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function loadAllData() {
      const data = await apiGet('loadAll');
      atletas = data.atletas || [];
      ocorrencias = data.ocorrencias || [];
      renderAthletes();
      renderAthleteSelect();
      renderOccurrences();
    }

    function renderAthletes() {
      const el = document.getElementById('athletesList');
      if (!atletas.length) {
        el.innerHTML = '<div class="item">Nenhum atleta cadastrado.</div>';
        return;
      }
      el.innerHTML = atletas.map(a => `
        <div class="item">
          <strong>${a.nome}</strong><br>
          ${a.modalidade || '-'} • ${a.categoria || '-'} • ${a.status || '-'}
        </div>
      `).join('');
    }

    function renderAthleteSelect() {
      const select = document.getElementById('atleta_id');
      select.innerHTML = '<option value="">Selecione o atleta</option>' + atletas.map(a => `
        <option value="${a.id}">${a.nome}</option>
      `).join('');
    }

    function renderOccurrences() {
      const el = document.getElementById('occurrencesList');
      if (!ocorrencias.length) {
        el.innerHTML = '<div class="item">Nenhuma ocorrência cadastrada.</div>';
        return;
      }
      el.innerHTML = ocorrencias.slice().reverse().map(o => {
        const atleta = atletas.find(a => String(a.id) === String(o.atleta_id));
        return `
          <div class="item">
            <strong>${atleta ? atleta.nome : 'Atleta'}</strong><br>
            ${o.data} • ${o.local} • ${o.tipo} • ${o.severidade}<br><br>
            ${o.descricao || ''}
          </div>
        `;
      }).join('');
    }

    async function addAthlete() {
      const payload = {
        action: 'addAthlete',
        id: Date.now(),
        nome: document.getElementById('nome').value,
        modalidade: document.getElementById('modalidade').value,
        idade: document.getElementById('idade').value,
        categoria: document.getElementById('categoria').value,
        sexo: document.getElementById('sexo').value,
        dominancia: document.getElementById('dominancia').value,
        status: 'Ativo',
        observacoes: document.getElementById('observacoes').value,
        foto: ''
      };

      if (!payload.nome || !payload.modalidade) {
        alert('Preencha nome e modalidade.');
        return;
      }

      const res = await apiPost(payload);
      if (res.ok) {
        alert('Atleta salvo com sucesso.');
        loadAllData();
      } else {
        alert('Erro ao salvar atleta.');
      }
    }

    async function addOccurrence() {
      const payload = {
        action: 'addOccurrence',
        id: Date.now(),
        atleta_id: document.getElementById('atleta_id').value,
        data: document.getElementById('data').value,
        local: document.getElementById('local').value,
        tipo: document.getElementById('tipo').value,
        severidade: document.getElementById('severidade').value,
        status: document.getElementById('status').value,
        retorno_treino: document.getElementById('retorno_treino').value,
        mecanismo: document.getElementById('mecanismo').value,
        profissional: document.getElementById('profissional').value,
        descricao: document.getElementById('descricao').value,
        conduta: document.getElementById('conduta').value
      };

      if (!payload.atleta_id || !payload.data || !payload.local || !payload.descricao) {
        alert('Preencha atleta, data, local e descrição.');
        return;
      }

      const res = await apiPost(payload);
      if (res.ok) {
        alert('Ocorrência salva com sucesso.');
        loadAllData();
      } else {
        alert('Erro ao salvar ocorrência.');
      }
    }

    loadAllData();
  </script>
</body>
</html>
