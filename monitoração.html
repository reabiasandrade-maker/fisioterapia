<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FisioTrack - Histórico de Lesões</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe4f0;
      --text: #132033;
      --muted: #62748a;
      --primary: #1d4ed8;
      --primary-2: #2563eb;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 12px;
      margin-top: 20px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: white;
      color: var(--text);
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .btn-primary:hover { background: var(--primary-2); }

    .btn-soft {
      background: #eff6ff;
      color: var(--primary);
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid #edf2f7;
    }

    .card-header {
      padding: 20px 20px 0;
    }

    .card-body {
      padding: 20px;
    }

    .card-title {
      margin: 0;
      font-size: 20px;
    }

    .card-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .athlete-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 76vh;
      overflow: auto;
      padding: 20px;
    }

    .athlete-item {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #f8fbff;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .athlete-item:hover {
      transform: translateY(-1px);
      border-color: #bfd0ea;
    }

    .athlete-item.active {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      border-color: transparent;
    }

    .athlete-item h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .athlete-item p {
      margin: 0;
      font-size: 13px;
      opacity: 0.85;
    }

    .profile-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .profile-name {
      margin: 0;
      font-size: 28px;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-gray { background: #e2e8f0; color: #334155; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-orange { background: #ffedd5; color: #c2410c; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 18px;
      border-radius: 20px;
      background: white;
      border: 1px solid var(--line);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat strong {
      font-size: 28px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 18px;
    }

    .body-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .body-controls button.active {
      background: var(--primary);
      color: white;
    }

    .body-map-wrap {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(180deg, #f8fbff, #eef4fb);
      padding: 16px;
      min-height: 640px;
      position: relative;
    }

    .body-map {
      width: 100%;
      max-width: 320px;
      height: 600px;
      margin: 0 auto;
      position: relative;
    }

    .figure-head,
    .figure-neck,
    .figure-torso,
    .figure-arm-left,
    .figure-arm-right,
    .figure-forearm-left,
    .figure-forearm-right,
    .figure-hip,
    .figure-leg-left,
    .figure-leg-right,
    .figure-calf-left,
    .figure-calf-right {
      position: absolute;
      background: #dfe7f1;
      border: 2px solid #9aa9bf;
    }

    .figure-head { width: 72px; height: 72px; border-radius: 50%; top: 18px; left: 124px; }
    .figure-neck { width: 24px; height: 20px; border-radius: 12px; top: 90px; left: 148px; }
    .figure-torso { width: 86px; height: 160px; border-radius: 30px; top: 104px; left: 117px; }
    .figure-arm-left { width: 30px; height: 110px; border-radius: 16px; top: 118px; left: 80px; }
    .figure-arm-right { width: 30px; height: 110px; border-radius: 16px; top: 118px; left: 210px; }
    .figure-forearm-left { width: 28px; height: 110px; border-radius: 16px; top: 220px; left: 70px; }
    .figure-forearm-right { width: 28px; height: 110px; border-radius: 16px; top: 220px; left: 222px; }
    .figure-hip { width: 96px; height: 40px; border-radius: 20px; top: 258px; left: 112px; }
    .figure-leg-left { width: 34px; height: 150px; border-radius: 20px; top: 292px; left: 125px; }
    .figure-leg-right { width: 34px; height: 150px; border-radius: 20px; top: 292px; left: 165px; }
    .figure-calf-left { width: 30px; height: 140px; border-radius: 20px; top: 438px; left: 127px; }
    .figure-calf-right { width: 30px; height: 140px; border-radius: 20px; top: 438px; left: 167px; }

    .body-point {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid white;
      background: #94a3b8;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.18);
    }

    .body-point.has-history { background: var(--danger); }
    .body-point.selected { outline: 3px solid rgba(37, 99, 235, 0.25); }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }

    .legend i {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .occurrence {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      background: #fbfdff;
    }

    .occurrence-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .occurrence p {
      margin: 8px 0 0;
      color: #334155;
      line-height: 1.5;
    }

    .occurrence small {
      color: var(--muted);
      display: block;
      margin-top: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: #f8fbff;
    }

    @media (max-width: 1100px) {
      .layout,
      .content-grid,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app { padding: 14px; }
      .hero { padding: 22px; }
      .hero h1 { font-size: 26px; }
      .profile-name { font-size: 22px; }
      .body-map-wrap { min-height: 620px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>FisioTrack</h1>
      <p>Aplicativo web para fisioterapia esportiva com perfil individual por atleta, histórico de lesões e queixas, e mapa corporal interativo para registrar regiões acometidas.</p>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Buscar atleta ou modalidade" />
        <input type="text" id="newName" placeholder="Nome do atleta" />
        <input type="text" id="newSport" placeholder="Modalidade" />
        <button class="btn-primary" id="addAthleteBtn">Criar atleta</button>
      </div>
    </section>

    <section class="layout">
      <aside class="card">
        <div class="card-header">
          <h2 class="card-title">Atletas</h2>
          <p class="card-subtitle">Selecione um perfil para visualizar o histórico clínico.</p>
        </div>
        <div class="athlete-list" id="athleteList"></div>
      </aside>

      <main id="mainContent"></main>
    </section>
  </div>

  <script>
    const bodyParts = [
      { id: 'cabeca', nome: 'Cabeça', x: 50, y: 9, lado: 'frente' },
      { id: 'pescoco', nome: 'Pescoço', x: 50, y: 15, lado: 'frente' },
      { id: 'ombro-direito', nome: 'Ombro direito', x: 33, y: 20, lado: 'frente' },
      { id: 'ombro-esquerdo', nome: 'Ombro esquerdo', x: 67, y: 20, lado: 'frente' },
      { id: 'cotovelo-direito', nome: 'Cotovelo direito', x: 20, y: 31, lado: 'frente' },
      { id: 'cotovelo-esquerdo', nome: 'Cotovelo esquerdo', x: 80, y: 31, lado: 'frente' },
      { id: 'punho-direito', nome: 'Punho direito', x: 16, y: 45, lado: 'frente' },
      { id: 'punho-esquerdo', nome: 'Punho esquerdo', x: 84, y: 45, lado: 'frente' },
      { id: 'torax', nome: 'Tórax', x: 50, y: 28, lado: 'frente' },
      { id: 'abdomen', nome: 'Abdômen', x: 50, y: 40, lado: 'frente' },
      { id: 'quadril-direito', nome: 'Quadril direito', x: 43, y: 52, lado: 'frente' },
      { id: 'quadril-esquerdo', nome: 'Quadril esquerdo', x: 57, y: 52, lado: 'frente' },
      { id: 'coxa-direita', nome: 'Coxa direita', x: 45, y: 63, lado: 'frente' },
      { id: 'coxa-esquerda', nome: 'Coxa esquerda', x: 55, y: 63, lado: 'frente' },
      { id: 'joelho-direito', nome: 'Joelho direito', x: 46, y: 77, lado: 'frente' },
      { id: 'joelho-esquerdo', nome: 'Joelho esquerdo', x: 54, y: 77, lado: 'frente' },
      { id: 'perna-direita', nome: 'Perna direita', x: 46, y: 89, lado: 'frente' },
      { id: 'perna-esquerda', nome: 'Perna esquerda', x: 54, y: 89, lado: 'frente' },
      { id: 'tornozelo-direito', nome: 'Tornozelo direito', x: 46, y: 97, lado: 'frente' },
      { id: 'tornozelo-esquerdo', nome: 'Tornozelo esquerdo', x: 54, y: 97, lado: 'frente' },
      { id: 'cervical', nome: 'Cervical', x: 50, y: 16, lado: 'costas' },
      { id: 'escapula-direita', nome: 'Escápula direita', x: 37, y: 26, lado: 'costas' },
      { id: 'escapula-esquerda', nome: 'Escápula esquerda', x: 63, y: 26, lado: 'costas' },
      { id: 'lombar', nome: 'Lombar', x: 50, y: 43, lado: 'costas' },
      { id: 'gluteo-direito', nome: 'Glúteo direito', x: 44, y: 54, lado: 'costas' },
      { id: 'gluteo-esquerdo', nome: 'Glúteo esquerdo', x: 56, y: 54, lado: 'costas' },
      { id: 'posterior-coxa-direita', nome: 'Posterior de coxa direita', x: 45, y: 65, lado: 'costas' },
      { id: 'posterior-coxa-esquerda', nome: 'Posterior de coxa esquerda', x: 55, y: 65, lado: 'costas' },
      { id: 'panturrilha-direita', nome: 'Panturrilha direita', x: 46, y: 88, lado: 'costas' },
      { id: 'panturrilha-esquerda', nome: 'Panturrilha esquerda', x: 54, y: 88, lado: 'costas' }
    ];

    const athletes = [
      {
        id: 1,
        nome: 'Carlos Eduardo',
        modalidade: 'Judô',
        idade: 19,
        status: 'Ativo',
        visualizacaoMapa: 'frente',
        historico: [
          {
            id: 101,
            data: '2026-03-02',
            local: 'ombro-direito',
            tipo: 'Lesão',
            severidade: 'Moderada',
            status: 'Em acompanhamento',
            descricao: 'Dor anterior no ombro após treino técnico com pegada alta.'
          },
          {
            id: 102,
            data: '2026-02-11',
            local: 'joelho-esquerdo',
            tipo: 'Queixa',
            severidade: 'Leve',
            status: 'Resolvido',
            descricao: 'Desconforto medial após sessão intensa de deslocamentos.'
          }
        ]
      },
      {
        id: 2,
        nome: 'Ana Silva',
        modalidade: 'Goalball',
        idade: 24,
        status: 'Ativo',
        visualizacaoMapa: 'costas',
        historico: [
          {
            id: 201,
            data: '2026-03-05',
            local: 'lombar',
            tipo: 'Queixa',
            severidade: 'Leve',
            status: 'Em acompanhamento',
            descricao: 'Rigidez lombar após retorno do microciclo com maior volume.'
          }
        ]
      }
    ];

    let selectedAthleteId = athletes[0].id;
    let searchTerm = '';
    let selectedBodyPoint = '';

    const athleteList = document.getElementById('athleteList');
    const mainContent = document.getElementById('mainContent');
    const searchInput = document.getElementById('searchInput');
    const addAthleteBtn = document.getElementById('addAthleteBtn');

    function getSelectedAthlete() {
      return athletes.find(a => a.id === selectedAthleteId);
    }

    function getPartName(id) {
      const part = bodyParts.find(p => p.id === id);
      return part ? part.nome : id;
    }

    function getSeverityBadgeClass(sev) {
      if (sev === 'Alta') return 'badge badge-red';
      if (sev === 'Moderada') return 'badge badge-orange';
      return 'badge badge-green';
    }

    function getStatusBadgeClass(status) {
      if (status === 'Em acompanhamento') return 'badge badge-blue';
      if (status === 'Resolvido') return 'badge badge-green';
      return 'badge badge-orange';
    }

    function renderAthletes() {
      const filtered = athletes.filter(a => {
        const text = (a.nome + ' ' + a.modalidade).toLowerCase();
        return text.includes(searchTerm.toLowerCase());
      });

      athleteList.innerHTML = '';

      if (!filtered.length) {
        athleteList.innerHTML = '<div class="empty-state">Nenhum atleta encontrado.</div>';
        return;
      }

      filtered.forEach(athlete => {
        const div = document.createElement('div');
        div.className = 'athlete-item' + (athlete.id === selectedAthleteId ? ' active' : '');
        div.innerHTML = `
          <h3>${athlete.nome}</h3>
          <p>${athlete.modalidade} • ${athlete.historico.length} registros</p>
        `;
        div.onclick = () => {
          selectedAthleteId = athlete.id;
          selectedBodyPoint = '';
          renderAthletes();
          renderMain();
        };
        athleteList.appendChild(div);
      });
    }

    function renderBodyPoints(athlete) {
      const mapa = athlete.visualizacaoMapa || 'frente';
      const usedLocals = athlete.historico.map(item => item.local);

      return bodyParts
        .filter(part => part.lado === mapa)
        .map(part => {
          const hasHistory = usedLocals.includes(part.id);
          const isSelected = selectedBodyPoint === part.id;
          return `
            <button
              class="body-point ${hasHistory ? 'has-history' : ''} ${isSelected ? 'selected' : ''}"
              style="left:${part.x}%; top:${part.y}%;"
              title="${part.nome}"
              onclick="selectBodyPoint('${part.id}')"
            ></button>
          `;
        })
        .join('');
    }

    function renderOccurrences(athlete) {
      if (!athlete.historico.length) {
        return '<div class="empty-state">Nenhuma ocorrência registrada para este atleta.</div>';
      }

      return athlete.historico
        .slice()
        .sort((a, b) => new Date(b.data) - new Date(a.data))
        .map(item => `
          <div class="occurrence">
            <div class="occurrence-top">
              <div>
                <div class="badges">
                  <span class="badge badge-gray">${item.tipo}</span>
                  <span class="${getSeverityBadgeClass(item.severidade)}">${item.severidade}</span>
                  <span class="${getStatusBadgeClass(item.status)}">${item.status}</span>
                </div>
              </div>
              <div class="badge badge-gray">${item.data}</div>
            </div>
            <strong>${getPartName(item.local)}</strong>
            <p>${item.descricao}</p>
            <small>Registro clínico do atleta.</small>
          </div>
        `)
        .join('');
    }

    function renderMain() {
      const athlete = getSelectedAthlete();
      if (!athlete) {
        mainContent.innerHTML = '<div class="card"><div class="card-body">Nenhum atleta selecionado.</div></div>';
        return;
      }

      const total = athlete.historico.length;
      const acompanhamento = athlete.historico.filter(i => i.status === 'Em acompanhamento').length;
      const resolvidos = athlete.historico.filter(i => i.status === 'Resolvido').length;

      mainContent.innerHTML = `
        <section class="card">
          <div class="card-body">
            <div class="profile-top">
              <div>
                <h2 class="profile-name">${athlete.nome}</h2>
                <div class="badges">
                  <span class="badge badge-blue">${athlete.modalidade}</span>
                  <span class="badge badge-gray">${athlete.idade || '-'} anos</span>
                  <span class="badge badge-green">${athlete.status}</span>
                </div>
              </div>
              <button class="btn-primary" onclick="scrollToForm()">Nova ocorrência</button>
            </div>

            <div class="stats">
              <div class="stat">
                <span>Total de ocorrências</span>
                <strong>${total}</strong>
              </div>
              <div class="stat">
                <span>Em acompanhamento</span>
                <strong>${acompanhamento}</strong>
              </div>
              <div class="stat">
                <span>Resolvidos</span>
                <strong>${resolvidos}</strong>
              </div>
            </div>

            <div class="content-grid">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Mapa corporal</h3>
                  <p class="card-subtitle">Marque a região acometida e registre a ocorrência.</p>
                </div>
                <div class="card-body">
                  <div class="body-controls">
                    <button class="btn-soft ${athlete.visualizacaoMapa === 'frente' ? 'active' : ''}" onclick="setMapView('frente')">Frente</button>
                    <button class="btn-soft ${athlete.visualizacaoMapa === 'costas' ? 'active' : ''}" onclick="setMapView('costas')">Costas</button>
                  </div>
                  <div class="body-map-wrap">
                    <div class="body-map">
                      <div class="figure-head"></div>
                      <div class="figure-neck"></div>
                      <div class="figure-torso"></div>
                      <div class="figure-arm-left"></div>
                      <div class="figure-arm-right"></div>
                      <div class="figure-forearm-left"></div>
                      <div class="figure-forearm-right"></div>
                      <div class="figure-hip"></div>
                      <div class="figure-leg-left"></div>
                      <div class="figure-leg-right"></div>
                      <div class="figure-calf-left"></div>
                      <div class="figure-calf-right"></div>
                      ${renderBodyPoints(athlete)}
                    </div>
                  </div>
                  <div class="legend">
                    <span><i style="background:#dc2626"></i> local com histórico</span>
                    <span><i style="background:#94a3b8"></i> sem registro</span>
                  </div>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Histórico clínico</h3>
                  <p class="card-subtitle">Linha do tempo de lesões e queixas do atleta.</p>
                </div>
                <div class="card-body">
                  <div class="timeline">${renderOccurrences(athlete)}</div>
                </div>
              </div>
            </div>

            <div class="card" id="occurrenceFormCard" style="margin-top:18px;">
              <div class="card-header">
                <h3 class="card-title">Registrar nova ocorrência</h3>
                <p class="card-subtitle">Cadastre lesões, queixas e regiões acometidas do atleta.</p>
              </div>
              <div class="card-body">
                <div class="form-grid">
                  <div>
                    <label>Data</label>
                    <input type="date" id="occDate" value="${new Date().toISOString().slice(0,10)}" />
                  </div>
                  <div>
                    <label>Local</label>
                    <select id="occLocal">
                      <option value="">Selecione</option>
                      ${bodyParts.map(part => `<option value="${part.id}" ${selectedBodyPoint === part.id ? 'selected' : ''}>${part.nome}</option>`).join('')}
                    </select>
                  </div>
                  <div>
                    <label>Tipo</label>
                    <select id="occType">
                      <option value="Lesão">Lesão</option>
                      <option value="Queixa">Queixa</option>
                    </select>
                  </div>
                  <div>
                    <label>Severidade</label>
                    <select id="occSeverity">
                      <option value="Leve">Leve</option>
                      <option value="Moderada">Moderada</option>
                      <option value="Alta">Alta</option>
                    </select>
                  </div>
                  <div>
                    <label>Status</label>
                    <select id="occStatus">
                      <option value="Em acompanhamento">Em acompanhamento</option>
                      <option value="Resolvido">Resolvido</option>
                      <option value="Recorrente">Recorrente</option>
                    </select>
                  </div>
                  <div>
                    <label>Atleta</label>
                    <input type="text" value="${athlete.nome}" disabled />
                  </div>
                  <div class="full">
                    <label>Descrição</label>
                    <textarea id="occDescription" placeholder="Descreva a lesão ou queixa, mecanismo, sinais, conduta e observações."></textarea>
                  </div>
                  <div class="full">
                    <button class="btn-primary" onclick="addOccurrence()">Salvar ocorrência</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function selectBodyPoint(pointId) {
      selectedBodyPoint = pointId;
      renderMain();
      const local = document.getElementById('occLocal');
      if (local) local.value = pointId;
    }

    function setMapView(view) {
      const athlete = getSelectedAthlete();
      athlete.visualizacaoMapa = view;
      renderMain();
    }

    function addOccurrence() {
      const athlete = getSelectedAthlete();
      const data = document.getElementById('occDate').value;
      const local = document.getElementById('occLocal').value;
      const tipo = document.getElementById('occType').value;
      const severidade = document.getElementById('occSeverity').value;
      const status = document.getElementById('occStatus').value;
      const descricao = document.getElementById('occDescription').value.trim();

      if (!data || !local || !descricao) {
        alert('Preencha data, local e descrição.');
        return;
      }

      athlete.historico.unshift({
        id: Date.now(),
        data,
        local,
        tipo,
        severidade,
        status,
        descricao
      });

      selectedBodyPoint = '';
      renderAthletes();
      renderMain();
    }

    function scrollToForm() {
      const el = document.getElementById('occurrenceFormCard');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    searchInput.addEventListener('input', e => {
      searchTerm = e.target.value;
      renderAthletes();
    });

    addAthleteBtn.addEventListener('click', () => {
      const nome = document.getElementById('newName').value.trim();
      const modalidade = document.getElementById('newSport').value.trim();

      if (!nome || !modalidade) {
        alert('Informe nome e modalidade do atleta.');
        return;
      }

      const novo = {
        id: Date.now(),
        nome,
        modalidade,
        idade: '',
        status: 'Ativo',
        visualizacaoMapa: 'frente',
        historico: []
      };

      athletes.unshift(novo);
      selectedAthleteId = novo.id;
      selectedBodyPoint = '';
      document.getElementById('newName').value = '';
      document.getElementById('newSport').value = '';
      renderAthletes();
      renderMain();
    });

    renderAthletes();
    renderMain();
  </script>
</body>
</html>
